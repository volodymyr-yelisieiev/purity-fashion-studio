name: Quality

on:
  push:
    branches:
      - main
      - master
      - develop
      - 'release/**'
  pull_request:

jobs:
  install-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --foreground-scripts

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

  playwright-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: install-and-build

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --foreground-scripts

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npm run test:smoke -- --reporter=list

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  visual-review:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: install-and-build
    continue-on-error: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --foreground-scripts

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run production copy audit
        run: npm run test:production-copy -- --reporter=list
        env:
          PLAYWRIGHT_APP_ENV: production
          PLAYWRIGHT_ENABLE_ADMIN: 'false'

      - name: Capture visual route screenshots
        run: npm run test:visual -- --reporter=list
        env:
          PLAYWRIGHT_APP_ENV: production
          PLAYWRIGHT_ENABLE_ADMIN: 'false'

      - name: Upload visual review artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-visual-review
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
