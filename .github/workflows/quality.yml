name: Quality

on:
  push:
    branches:
      - main
      - master
      - develop
      - 'release/**'
  pull_request:

jobs:
  install-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --foreground-scripts

      - name: Run build checks
        run: npm run ci:build

  playwright-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: install-and-build

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --foreground-scripts

      - name: Run smoke tests
        run: npm run ci:smoke

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  visual-review:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: install-and-build
    continue-on-error: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --foreground-scripts

      - name: Run visual review checks
        run: npm run ci:visual

      - name: Upload visual review artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-visual-review
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
