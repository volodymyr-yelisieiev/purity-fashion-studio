name: Bug report
description: Report a reproducible problem.
title: "fix: "
labels: [bug]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include the route, device/browser and steps.
    validations:
      required: true
